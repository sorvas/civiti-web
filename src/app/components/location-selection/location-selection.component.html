<div class="location-container">

  <!-- Auth buttons - top right -->
  <div class="auth-buttons" *ngIf="!(isAuthenticated$ | async)">
    <a class="auth-link" (click)="navigateToLogin()">
      <span nz-icon nzType="login" nzTheme="outline"></span>
      Conectează-te
    </a>
    <a class="auth-link auth-link-primary" (click)="navigateToRegister()">
      <span nz-icon nzType="user-add" nzTheme="outline"></span>
      Înregistrează-te
    </a>
  </div>

  <!-- User dropdown - top right (authenticated) -->
  <div class="user-menu" *ngIf="isAuthenticated$ | async">
    <div
      nz-dropdown
      [nzDropdownMenu]="userMenu"
      nzTrigger="click"
      nzPlacement="bottomRight"
      class="user-avatar-dropdown"
    >
      <nz-avatar
        [nzSrc]="(user$ | async)?.photoUrl || undefined"
        [nzText]="(displayName$ | async)?.charAt(0)"
        [nzSize]="36"
        class="user-avatar">
      </nz-avatar>
      <span nz-icon nzType="caret-down" nzTheme="fill" class="dropdown-arrow"></span>
    </div>
    <nz-dropdown-menu #userMenu="nzDropdownMenu">
      <ul nz-menu>
        <li nz-menu-item (click)="navigateToDashboard()">
          <span nz-icon nzType="dashboard" nzTheme="outline"></span>
          Panou
        </li>
        <li nz-menu-divider></li>
        <li nz-menu-item (click)="logout()">
          <span nz-icon nzType="logout" nzTheme="outline"></span>
          Deconectare
        </li>
      </ul>
    </nz-dropdown-menu>
  </div>

  <!-- Main Card -->
  <div class="location-card-wrapper">
    <nz-card [nzBordered]="false" class="location-card">

      <!-- Card Header: Logo + Title -->
      <div class="card-header">
        <img src="/images/logo/civiti-logo.svg" alt="Civiti" class="logo" />
        <h1 class="page-title">Participare Civică</h1>
        <p class="page-subtitle">Selectează-ți locația pentru a vedea problemele din comunitate</p>
      </div>

      <!-- Location Form -->
      <form nz-form [formGroup]="locationForm" (ngSubmit)="onContinue()" nzLayout="vertical" class="location-form">

        <nz-form-item>
          <nz-form-label nzRequired>Județ</nz-form-label>
          <nz-form-control>
            <nz-select formControlName="county" nzPlaceHolder="Selectează județul" nzShowSearch nzSize="large">
              <nz-option nzValue="B" nzLabel="București"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label nzRequired>Oraș</nz-form-label>
          <nz-form-control>
            <nz-select formControlName="city" nzPlaceHolder="Selectează orașul" nzShowSearch nzSize="large">
              <nz-option nzValue="București" nzLabel="București"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>

        <!-- Info Alert -->
        <nz-alert
          nzType="info"
          nzMessage="Pentru MVP"
          nzDescription="Momentan aplicația funcționează doar pentru București."
          nzShowIcon
          class="info-alert">
        </nz-alert>

        <!-- Continue Button -->
        <nz-form-item class="submit-section">
          <button
            nz-button
            nzType="primary"
            nzBlock
            nzSize="large"
            type="submit"
            [nzLoading]="isLoading"
            class="continue-btn">
            <span nz-icon nzType="arrow-right" nzTheme="outline"></span>
            {{ isLoading ? 'Se încarcă...' : 'Continuă la Probleme' }}
          </button>
        </nz-form-item>

      </form>

      <!-- Footer note -->
      <div class="card-footer">
        <p>
          <span nz-icon nzType="info-circle" nzTheme="outline"></span>
          Nu este nevoie de cont pentru a vizualiza problemele
        </p>
      </div>

    </nz-card>
  </div>
</div>
