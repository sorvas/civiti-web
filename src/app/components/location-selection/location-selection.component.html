<div class="location-container">

  <app-auth-buttons class="corner-auth" />

  <!-- Main Card -->
  <div class="location-card-wrapper">
    <nz-card [nzBordered]="false" class="location-card">

      <!-- Card Header: Logo + Title -->
      <div class="card-header">
        <img src="/images/logo/civiti-logo.svg" alt="Civiti" class="logo" />
        <h1 class="page-title">Participare Civică</h1>
        <p class="page-subtitle">Selectează-ți locația pentru a vedea problemele din comunitate</p>
      </div>

      <!-- Location Form -->
      <form nz-form [formGroup]="locationForm" (ngSubmit)="onContinue()" nzLayout="vertical" class="location-form">

        <nz-form-item>
          <nz-form-label nzRequired>Județ</nz-form-label>
          <nz-form-control>
            <nz-select formControlName="county" nzPlaceHolder="Selectează județul" nzShowSearch nzSize="large">
              <nz-option nzValue="B" [nzLabel]="defaultCity"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label nzRequired>Oraș</nz-form-label>
          <nz-form-control>
            <nz-select formControlName="city" nzPlaceHolder="Selectează orașul" nzShowSearch nzSize="large">
              <nz-option [nzValue]="defaultCity" [nzLabel]="defaultCity"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>

        <!-- Info Alert -->
        <nz-alert
          nzType="info"
          nzMessage="Pentru MVP"
          nzDescription="Momentan aplicația funcționează doar pentru București."
          nzShowIcon
          class="info-alert">
        </nz-alert>

        <!-- Continue Button -->
        <nz-form-item class="submit-section">
          <button
            nz-button
            nzType="primary"
            nzBlock
            nzSize="large"
            type="submit"
            [nzLoading]="isLoading"
            class="continue-btn">
            <span nz-icon nzType="arrow-right" nzTheme="outline"></span>
            {{ isLoading ? 'Se încarcă...' : 'Continuă la Probleme' }}
          </button>
        </nz-form-item>

      </form>

      <!-- Footer note -->
      <div class="card-footer">
        <p>
          <span nz-icon nzType="info-circle" nzTheme="outline"></span>
          Nu este nevoie de cont pentru a vizualiza problemele
        </p>
      </div>

    </nz-card>
  </div>
</div>
