<div class="location-picker-container">
  <!-- MVP Info Message -->
  <nz-alert
    nzType="info"
    nzMessage="Restricție MVP"
    nzDescription="Pentru versiunea curentă, acceptăm doar adrese din București."
    nzShowIcon
    class="mvp-alert">
  </nz-alert>

  <!-- Address Search Section -->
  <div class="address-section">
    <nz-form-item>
      <nz-form-label>Adresa</nz-form-label>
      <nz-form-control>
        <nz-input-group [nzPrefix]="searchIcon" [nzSuffix]="isSearching ? loadingIcon : emptyTemplate">
          <input
            nz-input
            #addressInput
            [formControl]="addressControl"
            placeholder="Caută adresa ta din București..."
            (blur)="onAddressInputBlur()"
          />
        </nz-input-group>
        <ng-template #searchIcon>
          <span nz-icon nzType="search" nzTheme="outline"></span>
        </ng-template>
        <ng-template #loadingIcon>
          <span nz-icon nzType="loading" nzTheme="outline"></span>
        </ng-template>
        <ng-template #emptyTemplate></ng-template>

        <!-- Autocomplete Suggestions Dropdown -->
        <div class="autocomplete-dropdown" *ngIf="showSuggestions && suggestions.length">
          <div
            *ngFor="let suggestion of suggestions"
            class="suggestion-item"
            (mousedown)="onSuggestionSelected(suggestion)">
            <span nz-icon nzType="environment" class="suggestion-icon"></span>
            <span class="suggestion-text">{{ suggestion.description }}</span>
          </div>
        </div>
      </nz-form-control>
    </nz-form-item>
  </div>

  <!-- Map Section -->
  <div class="map-section">
    <div *ngIf="!isMapLoaded && !mapLoadError" class="map-loading">
      <nz-spin nzTip="Se încarcă harta..."></nz-spin>
    </div>

    <nz-alert
      *ngIf="mapLoadError"
      nzType="error"
      nzMessage="Eroare la încărcarea hărții"
      nzDescription="Nu s-a putut încărca Google Maps. Vă rugăm să reîncercați."
      nzShowIcon>
    </nz-alert>

    <google-map
      *ngIf="isMapLoaded"
      height="350px"
      width="100%"
      [center]="mapCenter"
      [zoom]="mapZoom"
      [options]="mapOptions"
      (mapClick)="onMapClick($event)">

      <!-- Draggable Marker -->
      <map-marker
        *ngIf="markerPosition"
        [position]="markerPosition"
        [options]="markerOptions"
        (mapDragend)="onMarkerDragEnd($event)">
      </map-marker>

    </google-map>
  </div>

  <!-- Selected Location Display -->
  <div class="selected-location" *ngIf="selectedLocation">
    <nz-card size="small" class="location-card" [class.invalid-location]="!isInAllowedArea()">
      <div class="location-info">
        <span nz-icon
          [nzType]="isInAllowedArea() ? 'check-circle' : 'warning'"
          nzTheme="fill"
          [class.success-icon]="isInAllowedArea()"
          [class.warning-icon]="!isInAllowedArea()">
        </span>
        <div class="location-text">
          <strong>{{ selectedLocation.address }}</strong>
          <nz-tag
            class="district-tag"
            *ngIf="selectedLocation.district"
            [nzColor]="isInAllowedArea() ? 'green' : 'orange'">
            {{ selectedLocation.district }}
          </nz-tag>
        </div>
      </div>
      <div class="coordinates">
        <small>Coordonate: {{ selectedLocation.latitude.toFixed(6) }}, {{ selectedLocation.longitude.toFixed(6) }}</small>
      </div>
    </nz-card>

    <!-- Location Restriction Warning -->
    <nz-alert
      *ngIf="getLocationRestrictionMessage()"
      nzType="warning"
      [nzMessage]="getLocationRestrictionMessage()"
      nzShowIcon
      class="restriction-alert">
    </nz-alert>
  </div>

  <!-- Instruction Text -->
  <p class="instruction-text" *ngIf="isMapLoaded">
    <span nz-icon nzType="info-circle" nzTheme="outline"></span>
    Poți da click pe hartă sau trage markerul pentru a ajusta locația exactă.
  </p>

  <!-- Action Buttons -->
  <div class="action-buttons">
    <button nz-button nzType="default" (click)="cancel()">
      Anulează
    </button>
    <button
      nz-button
      nzType="primary"
      [disabled]="!isLocationValid()"
      (click)="confirmLocation()">
      Confirmă locația
    </button>
  </div>
</div>
