<div class="reset-password-container">

  <!-- Card Wrapper -->
  <div class="reset-password-card-wrapper">

    <!-- Loading Session View -->
    <ng-container *ngIf="checkingSession">
      <nz-card [nzBordered]="false" class="reset-password-card">
        <div class="loading-content">
          <nz-spin nzSimple [nzSize]="'large'"></nz-spin>
          <p class="loading-text">Se verifică sesiunea...</p>
        </div>
      </nz-card>
    </ng-container>

    <!-- Session Error View -->
    <ng-container *ngIf="!checkingSession && !sessionValid">
      <nz-card [nzBordered]="false" class="reset-password-card">
        <nz-result
          nzStatus="error"
          nzTitle="Link invalid sau expirat"
          nzSubTitle="Link-ul de resetare a parolei a expirat sau este invalid. Te rugăm să soliciți un nou link.">
          <div nz-result-extra>
            <button
              nz-button
              nzType="primary"
              nzSize="large"
              routerLink="/auth/forgot-password">
              <span nz-icon nzType="redo"></span>
              Solicită un nou link
            </button>
            <button
              nz-button
              nzType="default"
              nzSize="large"
              routerLink="/auth/login">
              <span nz-icon nzType="login"></span>
              Înapoi la autentificare
            </button>
          </div>
        </nz-result>
      </nz-card>
    </ng-container>

    <!-- Password Form View -->
    <ng-container *ngIf="!checkingSession && sessionValid">
      <nz-card [nzBordered]="false" class="reset-password-card">
        <nz-spin [nzSpinning]="(isLoading$ | async) || false">

          <!-- Card Header -->
          <div class="card-header">
            <div class="header-icon">
              <span nz-icon nzType="key" nzTheme="outline"></span>
            </div>
            <h1 class="page-title">Resetează parola</h1>
            <p class="page-subtitle">
              Introdu noua ta parolă. Asigură-te că are cel puțin 6 caractere.
            </p>
          </div>

          <!-- Error Alert -->
          <nz-alert
            *ngIf="error$ | async as error"
            [nzMessage]="error"
            nzType="error"
            nzShowIcon
            nzCloseable
            (nzOnClose)="clearError()"
            class="error-alert">
          </nz-alert>

          <!-- Reset Password Form -->
          <form nz-form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" class="reset-password-form">

            <nz-form-item>
              <nz-form-label [nzSpan]="24" nzFor="password" nzRequired>Parolă nouă</nz-form-label>
              <nz-form-control [nzSpan]="24" nzErrorTip="Parola trebuie să aibă cel puțin 6 caractere">
                <nz-input-group [nzSuffix]="passwordSuffix">
                  <input
                    nz-input
                    formControlName="password"
                    id="password"
                    [type]="passwordVisible ? 'text' : 'password'"
                    placeholder="Introdu noua parolă"
                    autocomplete="new-password"
                    class="password-input">
                </nz-input-group>
                <ng-template #passwordSuffix>
                  <span
                    nz-icon
                    [nzType]="passwordVisible ? 'eye-invisible' : 'eye'"
                    (click)="passwordVisible = !passwordVisible"
                    class="password-toggle">
                  </span>
                </ng-template>
              </nz-form-control>
            </nz-form-item>

            <nz-form-item>
              <nz-form-label [nzSpan]="24" nzFor="confirmPassword" nzRequired>Confirmă parola</nz-form-label>
              <nz-form-control
                [nzSpan]="24"
                [nzValidateStatus]="confirmPasswordValidateStatus"
                [nzErrorTip]="confirmPasswordErrorTip">
                <nz-input-group [nzSuffix]="confirmPasswordSuffix">
                  <input
                    nz-input
                    formControlName="confirmPassword"
                    id="confirmPassword"
                    [type]="confirmPasswordVisible ? 'text' : 'password'"
                    placeholder="Confirmă noua parolă"
                    autocomplete="new-password"
                    class="password-input">
                </nz-input-group>
                <ng-template #confirmPasswordSuffix>
                  <span
                    nz-icon
                    [nzType]="confirmPasswordVisible ? 'eye-invisible' : 'eye'"
                    (click)="confirmPasswordVisible = !confirmPasswordVisible"
                    class="password-toggle">
                  </span>
                </ng-template>
                <ng-template #confirmPasswordErrorTip>
                  <span *ngIf="resetPasswordForm.get('confirmPassword')?.hasError('required')">
                    Te rugăm să confirmi parola
                  </span>
                  <span *ngIf="resetPasswordForm.hasError('passwordMismatch')">
                    Parolele nu se potrivesc
                  </span>
                </ng-template>
              </nz-form-control>
            </nz-form-item>

            <!-- Submit Button -->
            <nz-form-item class="submit-section">
              <nz-form-control [nzSpan]="24">
                <button
                  nz-button
                  nzType="primary"
                  nzSize="large"
                  nzBlock
                  type="submit"
                  [disabled]="!resetPasswordForm.valid"
                  class="submit-btn">
                  <span nz-icon nzType="check"></span>
                  Schimbă parola
                </button>
              </nz-form-control>
            </nz-form-item>

          </form>

          <!-- Login Link -->
          <div class="login-link">
            <p>Ai nevoie de ajutor?
              <a routerLink="/auth/forgot-password" class="login-link-text">Solicită un nou link</a>
            </p>
          </div>

        </nz-spin>
      </nz-card>
    </ng-container>

  </div>
</div>
